services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fit4110/access-gate:lab05
    container_name: fit4110-access-gate-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: fit4110-access-gate-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-access_gate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-access_gate_password}
      POSTGRES_DB: ${POSTGRES_DB:-access_gate_db}
    volumes:
      - access-gate-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - team-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-access_gate_user} -d ${POSTGRES_DB:-access_gate_db}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    image: python:3.11-slim
    container_name: fit4110-access-gate-ai-lab05
    working_dir: /service
    volumes:
      - ./src/ai_service:/service:ro
    command: ["python", "main.py"]
    networks:
      - team-internal
    ports:
      - "9000:9000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  team-internal:
    driver: bridge

  class-net:
    driver: bridge

volumes:
  access-gate-db-data: